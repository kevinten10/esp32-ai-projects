; ESP32 气象站项目 - 普中 ESP32 配置
[platformio]
default_envs = puzhong-esp32

[env:puzhong-esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM3
build_src_filter = +<*>

lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/DHT sensor library@^1.4.7

; 构建标志
build_flags = 
    -D BOARD_NAME=\"PZ-ESP32\"
    -D DHT_PIN=4
    -D OLED_SDA=21
    -D OLED_SCL=22
    -D LED_PIN=2
