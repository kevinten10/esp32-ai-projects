; 气象站项目
; 普中 ESP32 + DHT22 + OLED
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32@6.7.0
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit SSD1306@^2.5.9

build_src_filter = +<*>
build_flags =
    -DBOARD_NAME="WeatherStation"
    -DCORE_DEBUG_LEVEL=1
