; AI 摄像头项目（ESP32-CAM AI Thinker）
; 烧录时 IO0 必须接 GND！
[platformio]
default_envs = esp32cam

[env:esp32cam]
platform  = espressif32@6.7.0
board     = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = huge_app.csv

build_src_filter = +<*>
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0
